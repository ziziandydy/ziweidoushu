<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: deep purple → indigo → dark blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="45%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Title gradient: light purple → sky blue -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Accent bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Glow left -->
    <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow right -->
    <radialGradient id="glowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="150" cy="200" rx="350" ry="350" fill="url(#glowL)"/>
  <ellipse cx="1100" cy="480" rx="300" ry="300" fill="url(#glowR)"/>

  <!-- Decorative stars (scattered) -->
  <circle cx="780" cy="55"  r="2"   fill="white" opacity="0.5"/>
  <circle cx="840" cy="100" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="910" cy="40"  r="2.5" fill="white" opacity="0.6"/>
  <circle cx="980" cy="80"  r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1040" cy="30" r="2"   fill="white" opacity="0.55"/>
  <circle cx="1090" cy="70" r="1"   fill="white" opacity="0.3"/>
  <circle cx="1130" cy="110" r="2"  fill="white" opacity="0.45"/>
  <circle cx="860" cy="145" r="1"   fill="white" opacity="0.25"/>
  <circle cx="1060" cy="130" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="750" cy="110" r="1"   fill="white" opacity="0.2"/>
  <circle cx="1150" cy="50" r="1.5" fill="white" opacity="0.4"/>

  <!-- Right side: decorative Zi Wei chart ring (subtle) -->
  <g transform="translate(870, 315)" opacity="0.1" stroke="white" fill="none">
    <circle cx="170" cy="0" r="190" stroke-width="1.5"/>
    <circle cx="170" cy="0" r="135" stroke-width="1"/>
    <circle cx="170" cy="0" r="78"  stroke-width="1"/>
    <!-- 12 palace dividers (every 30°) -->
    <line x1="170" y1="-190" x2="170" y2="190" stroke-width="0.8"/>
    <line x1="-20" y1="0"    x2="360" y2="0"   stroke-width="0.8"/>
    <line x1="75"  y1="-165" x2="265" y2="165"  stroke-width="0.8"/>
    <line x1="75"  y1="165"  x2="265" y2="-165" stroke-width="0.8"/>
    <line x1="-15" y1="-95"  x2="355" y2="95"   stroke-width="0.8"/>
    <line x1="-15" y1="95"   x2="355" y2="-95"  stroke-width="0.8"/>
    <!-- Center dot -->
    <circle cx="170" cy="0" r="6" fill="white" opacity="0.4"/>
  </g>

  <!-- ── Left content block ── -->

  <!-- Badge pill -->
  <rect x="100" y="148" width="180" height="38" rx="19" fill="#7c3aed" fill-opacity="0.75"/>
  <text x="190" y="173"
        text-anchor="middle"
        font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',Arial,sans-serif"
        font-size="17" font-weight="600" fill="white" letter-spacing="1">
    AI 命理平台
  </text>

  <!-- Main title -->
  <text x="100" y="315"
        font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',Arial,sans-serif"
        font-size="96" font-weight="900" fill="url(#titleGrad)" letter-spacing="4">
    AI 紫微斗數
  </text>

  <!-- Subtitle line 1 -->
  <text x="103" y="383"
        font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',Arial,sans-serif"
        font-size="30" fill="#e9d5ff" fill-opacity="0.92" letter-spacing="1">
    結合傳統命理智慧與現代 AI 技術
  </text>

  <!-- Subtitle line 2 -->
  <text x="103" y="432"
        font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',Arial,sans-serif"
        font-size="22" fill="#c4b5fd" fill-opacity="0.75" letter-spacing="0.5">
    中州派理論 × AI 深度解析 × 白話文運勢
  </text>

  <!-- Divider bar -->
  <rect x="100" y="472" width="140" height="4" rx="2" fill="url(#barGrad)"/>

  <!-- URL -->
  <text x="100" y="520"
        font-family="'PingFang TC','Microsoft JhengHei','Noto Sans TC',Arial,sans-serif"
        font-size="22" fill="#a78bfa" fill-opacity="0.85" letter-spacing="0.5">
    aiziwei.online
  </text>

  <!-- Bottom gradient strip (decorative) -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#barGrad)" opacity="0.6"/>
</svg>
